apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-v1
  namespace: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-api
      version: v1
  template:
    metadata:
      labels:
        app: payment-api
        version: v1
    spec:
      serviceAccountName: payment-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: payment-api
          image: payment-api:local
          imagePullPolicy: IfNotPresent
          env:
            - name: VERSION
              value: v1
            - name: RISK_URL
              value: http://risk-api:8080/risk
            - name: LEDGER_URL
              value: http://ledger-api:8080/record
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: payments
spec:
  selector:
    app: payment-api
  ports:
    - name: http
      port: 8080
      targetPort: http
