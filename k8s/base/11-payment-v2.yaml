apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-v2
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
      version: v2
  template:
    metadata:
      labels:
        app: payment-api
        version: v2
    spec:
      serviceAccountName: payment-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: payment-api
          image: payment-api:local
          imagePullPolicy: IfNotPresent
          env:
            - name: VERSION
              value: v2
            - name: RISK_URL
              value: http://risk-api:8080/risk
            - name: LEDGER_URL
              value: http://ledger-api:8080/record
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
